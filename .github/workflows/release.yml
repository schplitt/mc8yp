name: Release

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ASSET_BASENAME: ${{ github.event.repository.name }}
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build server
        run: pnpm build

      - name: Update cumulocity.json from package.json
        run: node scripts/cumulocity.mjs

      - name: Build versioned Cumulocity packages
        run: |
          set -eux
          TAG_NAME="${{ env.TAG_NAME }}" pnpm package:microservices

      - name: Generate changelog and create release
        run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload Cumulocity packages to release
        run: |
          set -eux
          gh release upload "${{ env.TAG_NAME }}" "${{ env.ASSET_BASENAME }}"-*_"${{ env.TAG_NAME }}".zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
