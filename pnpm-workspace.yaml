catalogMode: prefer

minimumReleaseAgeExclude:
  - '@iso4/*'
shellEmulator: true

blockExoticSubdeps: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - cached-factory@0.1.0
  - undici-types@6.21.0
  - tinyexec@1.2.2

catalog:
  '@apidevtools/json-schema-ref-parser': ^15.3.6
  '@c8y/client': ^1023.83.4
  '@clack/prompts': ^1.5.1
  '@huggingface/transformers': ^4.2.0
  '@iso4/fetch': ^0.0.1
  '@iso4/sandbox': ^0.0.4
  '@napi-rs/keyring': ^1.3.0
  '@schplitt/eslint-config': ^1.5.1
  '@tmcp/adapter-valibot': ^0.1.6
  '@tmcp/transport-http': ^0.8.6
  '@tmcp/transport-stdio': ^0.4.3
  '@toon-format/toon': ^2.3.0
  '@types/node': ^25.9.2
  bumpp: ^11.1.0
  changelogithub: ^14.0.0
  citty: ^0.2.2
  consola: ^3.4.2
  eslint: ^10.4.1
  h3: 2.0.1-rc.22
  rolldown: ~1.1.0
  tmcp: ^1.19.4
  tsdown: ^0.22.2
  typescript: ^6.0.3
  ufo: ^1.6.4
  unctx: ^2.5.0
  valibot: ^1.4.1
  vitest: ^4.1.8
onlyBuiltDependencies:
  - better-sqlite3
  - cbor-extract
  - esbuild
  - isolated-vm
  - onnxruntime-node
  - protobufjs
  - sharp
allowBuilds:
  better-sqlite3: true
  cbor-extract: true
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
