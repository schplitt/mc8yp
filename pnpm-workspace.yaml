  '@clack/prompts': ^1.4.0
  '@napi-rs/keyring': ^1.3.0
  '@schplitt/eslint-config': ^1.5.1
  '@tmcp/adapter-valibot': ^0.1.6
  '@tmcp/transport-http': ^0.8.6
  '@tmcp/transport-stdio': ^0.4.3
  '@toon-format/toon': ^2.3.0
  '@types/node': ^24.12.3
  bumpp: ^11.1.0
  changelogithub: ^14.0.0
  citty: ^0.2.2
  consola: ^3.4.2
  eslint: ^10.4.0
  h3: 2.0.1-rc.6
  secure-exec: ^0.2.1
  tmcp: ^1.19.4
  tsdown: ^0.22.0
  typescript: ^6.0.3
  ufo: ^1.6.4
  unctx: ^2.5.0
  valibot: ^1.4.1
  vitest: ^4.1.7
onlyBuiltDependencies:
